# Docker Compose cho project Fashion Store Analytics
# Chạy PostgreSQL, pgAdmin và Jupyter Notebook trên Docker Desktop.

services:
  postgres:
    image: postgres:16
    container_name: fashion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fashion_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Cho phép kết nối PostgreSQL từ máy Windows qua localhost:5432
      - "5432:5432"
    volumes:
      # Lưu dữ liệu PostgreSQL để không mất khi stop/start container
      - postgres_data:/var/lib/postgresql/data
      # Mount thư mục data để PostgreSQL container có thể đọc file CSV nếu cần import thủ công
      - ./data:/data
      # Tự chạy các file .sql khi database được tạo lần đầu
      - ./sql/init:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4
    container_name: fashion_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      # Truy cập pgAdmin tại http://localhost:5050
      - "5050:80"
    depends_on:
      - postgres

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion_jupyter
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: fashion_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/fashion_dw
    ports:
      # Truy cập Jupyter tại http://localhost:8888
      - "8888:8888"
    volumes:
      # Mount toàn bộ project để notebook, src, data, reports được đồng bộ với máy host
      - ./:/app
    working_dir: /app
    depends_on:
      - postgres

volumes:
  postgres_data:
